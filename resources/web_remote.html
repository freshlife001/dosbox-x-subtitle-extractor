<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DOSBox-X Remote Control</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #screen-container { position: relative; }
        canvas { border: 2px solid #333; display: block; }
        #info { position: fixed; top: 10px; left: 10px; color: #fff; font-family: monospace; }
        #ocr { position: fixed; bottom: 60px; right: 10px; color: #0f0; font-family: monospace; background: rgba(0,0,0,0.8); padding: 10px; font-size: 16px; max-width: 500px; z-index: 100; white-space: pre-wrap; }
        #translation { position: fixed; color: #ff0; font-family: monospace; background: rgba(0,0,0,0.85); padding: 10px; font-size: 18px; z-index: 100; white-space: pre-wrap; border: 1px solid #ff0; cursor: move; user-select: none; display: flex; flex-direction: column; }
        #translation-text { cursor: text; user-select: text; flex: 1; overflow: auto; min-height: 0; }
        #translation-resize { position: absolute; right: 0; bottom: 0; width: 20px; height: 20px; cursor: nwse-resize; background: linear-gradient(135deg, transparent 50%, #f80 50%); }
        #controls { position: fixed; bottom: 10px; left: 10px; color: #fff; font-family: monospace; }
        #controls button { margin: 5px; padding: 8px 16px; cursor: pointer; }
        #controls select { margin: 5px; padding: 5px; background: #333; color: #fff; border: 1px solid #fff; cursor: pointer; }
        #region-info { position: fixed; bottom: 10px; right: 10px; color: #0ff; font-family: monospace; background: rgba(0,0,0,0.8); padding: 10px; }
        .region-overlay { position: absolute; border: 2px solid #ff0; background: rgba(255,255,0,0.2); pointer-events: none; }
        #connection-status { position: fixed; top: 10px; right: 10px; color: #fff; font-family: monospace; }
    </style>
</head>
<body>
    <div id="info">FPS: <span id="fps">0</span> | Mouse: <span id="mouse-pos">x:0 y:0</span> | Δ: <span id="mouse-delta">dx:0 dy:0</span></div>
    <div id="connection-status">WS: <span id="ws-status">Disconnected</span></div>
    <div id="ocr">OCR: <span id="ocr-text">-</span></div>
    <div id="translation">
        <div id="translation-text">-</div>
        <div id="translation-resize"></div>
    </div>
    <div id="controls">
        <button id="fullscreen">Fullscreen</button>
        <button id="select-region">Select OCR Region</button>
        <button id="reset-region">Reset Region</button>
        <select id="ocr-type-select">
            <option value="ollama">Ollama OCR</option>
            <option value="vision">Vision OCR</option>
        </select>
        <select id="lang-select">
            <option value="zh">中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="ru">Русский</option>
        </select>
        <span id="mode-info"></span>
    </div>
    <div id="region-info">Region: Full Screen</div>
    <div id="screen-container">
        <canvas id="screen"></canvas>
        <div id="region-overlay" class="region-overlay" style="display:none;"></div>
    </div>

    <script>
const canvas = document.getElementById('screen');
const ctx = canvas.getContext('2d');
const fpsSpan = document.getElementById('fps');
const wsStatusSpan = document.getElementById('ws-status');
const ocrText = document.getElementById('ocr-text');
const translationText = document.getElementById('translation-text');
const screenContainer = document.getElementById('screen-container');
const regionOverlay = document.getElementById('region-overlay');
const regionInfo = document.getElementById('region-info');
const modeInfo = document.getElementById('mode-info');
const selectBtn = document.getElementById('select-region');
const resetBtn = document.getElementById('reset-region');
const langSelect = document.getElementById('lang-select');
const ocrTypeSelect = document.getElementById('ocr-type-select');
const fullscreenBtn = document.getElementById('fullscreen');

// WebSocket connection
let ws = null;
let reconnectTimer = null;

function connectWebSocket() {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = protocol + '//' + window.location.host;

    ws = new WebSocket(wsUrl, 'ws');

    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
        wsStatusSpan.textContent = 'Connected';
        wsStatusSpan.style.color = '#0f0';
        console.log('[WS] Connected');

        // Send initial config
        sendConfig();
    };

    ws.onclose = () => {
        wsStatusSpan.textContent = 'Disconnected';
        wsStatusSpan.style.color = '#f00';
        console.log('[WS] Disconnected');

        // Auto reconnect
        if (!reconnectTimer) {
            reconnectTimer = setTimeout(() => {
                reconnectTimer = null;
                connectWebSocket();
            }, 3000);
        }
    };

    ws.onerror = (err) => {
        console.error('[WS] Error:', err);
    };

    ws.onmessage = (event) => {
        if (event.data instanceof ArrayBuffer) {
            // Binary frame data
            handleFrameData(event.data);
        } else {
            // Text message (JSON)
            handleTextMessage(event.data);
        }
    };
}

function handleFrameData(data) {
    const view = new DataView(data);
    const type = view.getUint8(0);

    if (type === 0x01) {  // Frame type
        const width = view.getUint16(1, true);
        const height = view.getUint16(3, true);

        if (width < 32 || height < 32 || width > 2048 || height > 2048) return;

        const frameData = new Uint8Array(data, 5);

        // Update canvas
        if (canvas.width !== width || canvas.height !== height) {
            canvas.width = width;
            canvas.height = height;
        }

        // BGRA to RGBA
        const imageData = ctx.createImageData(width, height);
        for (let i = 0; i < width * height * 4; i += 4) {
            imageData.data[i + 0] = frameData[i + 2]; // R
            imageData.data[i + 1] = frameData[i + 1]; // G
            imageData.data[i + 2] = frameData[i + 0]; // B
            imageData.data[i + 3] = 255;              // A
        }

        ctx.putImageData(imageData, 0, 0);
        showRegionOverlay();

        // FPS
        frameCount++;
        const now = performance.now();
        if (now - lastTime >= 1000) {
            fpsSpan.textContent = frameCount;
            frameCount = 0;
            lastTime = now;
        }
    }
}

function handleTextMessage(message) {
    try {
        const data = JSON.parse(message);

        if (data.type === 'ocr' && data.text) {
            if (data.text !== lastOcrText) {
                lastOcrText = data.text;
                ocrText.textContent = data.text;
                translateToLanguage(data.text);
            }
        }
    } catch (e) {
        console.error('[WS] Parse error:', e);
    }
}

function sendConfig() {
    // Send saved region
    if (ocrRegion) {
        wsSend({ type: 'region', ...ocrRegion });
    }

    // Send OCR type
    wsSend({ type: 'ocr-type', ocr_type: currentOcrType });
}

function wsSend(message) {
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(message));
    }
}

// OCR type configuration
const OCR_TYPES = { ollama: 'Ollama OCR', vision: 'Vision OCR' };
let currentOcrType = 'ollama';

ocrTypeSelect.addEventListener('change', () => {
    currentOcrType = ocrTypeSelect.value;
    localStorage.setItem('ocrType', currentOcrType);
    wsSend({ type: 'ocr-type', ocr_type: currentOcrType });
});

function loadOcrTypeConfig() {
    const saved = localStorage.getItem('ocrType');
    if (saved && OCR_TYPES[saved]) {
        currentOcrType = saved;
        ocrTypeSelect.value = saved;
    }
}

// Language configuration
const LANG_NAMES = {
    zh: '中文', en: 'English', ja: '日本語', ko: '한국어',
    es: 'Español', fr: 'Français', de: 'Deutsch', ru: 'Русский'
};
let currentLang = 'zh';

langSelect.addEventListener('change', () => {
    currentLang = langSelect.value;
    localStorage.setItem('translationLang', currentLang);
});

function loadLangConfig() {
    const saved = localStorage.getItem('translationLang');
    if (saved && LANG_NAMES[saved]) {
        currentLang = saved;
        langSelect.value = saved;
    }
}

// Fullscreen + Pointer Lock
let isPointerLocked = false;

fullscreenBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) {
        screenContainer.requestFullscreen().then(() => {
            canvas.requestPointerLock();
        }).catch(err => console.error('Fullscreen error:', err));
    } else {
        document.exitFullscreen();
        if (document.pointerLockElement) {
            document.exitPointerLock();
        }
    }
});

document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement && document.pointerLockElement) {
        document.exitPointerLock();
    }
});

document.addEventListener('pointerlockchange', () => {
    isPointerLocked = document.pointerLockElement === canvas;
    if (isPointerLocked) {
        modeInfo.textContent = '[Pointer Locked - ESC to exit]';
        fullscreenBtn.textContent = 'Exit Fullscreen';
    } else {
        modeInfo.textContent = '';
        fullscreenBtn.textContent = 'Fullscreen';
    }
});

// Pointer lock mouse movement
document.addEventListener('mousemove', (e) => {
    if (isPointerLocked) {
        mouse_dx = e.movementX;
        mouse_dy = e.movementY;
        sendInput();
    }
});

// OCR history for translation
const ocrHistory = [];
const MAX_OCR_HISTORY = 3;
let lastOcrText = '';
let isTranslating = false;

async function translateToLanguage(newText) {
    if (!newText || newText.trim() === '' || isTranslating) return;
    isTranslating = true;
    translationText.textContent = '';

    const targetLang = LANG_NAMES[currentLang];
    const contextLines = ocrHistory.map(item =>
        `原文：${item.original}\n翻译：${item.translation}`
    ).join('\n\n');

    const prompt = `将以下游戏文本翻译为${targetLang}。上下文仅供参考，不要翻译上下文。

上下文（仅供参考）：
${contextLines}

原文（需要翻译）：
${newText}

要求：
1. 只翻译原文，不要翻译上下文
2. 只输出翻译结果，不要解释
3. 保持游戏术语的一致性
4. 结合上下文理解语义
5. 游戏数值(如HP、MP、等级等)保留数值部分

翻译：`;

    let fullTranslation = '';

    try {
        const response = await fetch('http://localhost:11434/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: 'gemma4:26b',
                prompt: prompt,
                think: false,
                stream: true
            })
        });

        if (!response.ok) {
            translationText.textContent = '翻译服务连接失败';
            isTranslating = false;
            return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
                if (line.trim()) {
                    try {
                        const json = JSON.parse(line);
                        if (json.response) {
                            fullTranslation += json.response;
                            translationText.textContent += json.response;
                        }
                    } catch (e) {}
                }
            }
        }

        if (fullTranslation.trim()) {
            const exists = ocrHistory.some(item => item.original === newText);
            if (!exists) {
                ocrHistory.push({ original: newText, translation: fullTranslation.trim() });
                if (ocrHistory.length > MAX_OCR_HISTORY) ocrHistory.shift();
            }
        }
    } catch (err) {
        translationText.textContent = '翻译请求错误: ' + err.message;
    }

    isTranslating = false;
}

// OCR Region
let ocrRegion = null;
let selectMode = false;
let dragStart = null;
let dragEnd = null;

// Translation Box drag & resize
const translationBox = document.getElementById('translation');
const translationResize = document.getElementById('translation-resize');
let transDragging = false;
let transResizing = false;
let transDragStart = { x: 0, y: 0 };
let transBoxStart = { x: 0, y: 0, width: 0, height: 0 };

function saveTranslationPos() {
    localStorage.setItem('translationPos', JSON.stringify({
        left: translationBox.style.left,
        top: translationBox.style.top,
        bottom: translationBox.style.bottom,
        width: translationBox.style.width,
        height: translationBox.style.height
    }));
}

function loadTranslationPos() {
    const saved = localStorage.getItem('translationPos');
    if (saved) {
        try {
            const pos = JSON.parse(saved);
            if (pos.left) translationBox.style.left = pos.left;
            if (pos.top) translationBox.style.top = pos.top;
            if (pos.bottom) translationBox.style.bottom = pos.bottom || '';
            if (pos.width) translationBox.style.width = pos.width;
            if (pos.height) translationBox.style.height = pos.height || '';
        } catch (e) {
            localStorage.removeItem('translationPos');
        }
    }
    if (!translationBox.style.left && !translationBox.style.top) {
        translationBox.style.left = '10px';
        translationBox.style.bottom = '60px';
        translationBox.style.width = '500px';
    }
}

translationBox.addEventListener('mousedown', (e) => {
    if (e.target === translationResize) return;
    transDragging = true;
    transDragStart = { x: e.clientX, y: e.clientY };
    const rect = translationBox.getBoundingClientRect();
    transBoxStart = { x: rect.left, y: rect.top };
    translationBox.style.bottom = '';
    e.preventDefault();
});

translationResize.addEventListener('mousedown', (e) => {
    transResizing = true;
    transDragStart = { x: e.clientX, y: e.clientY };
    const rect = translationBox.getBoundingClientRect();
    transBoxStart = { width: rect.width, height: rect.height };
    e.preventDefault();
    e.stopPropagation();
});

document.addEventListener('mousemove', (e) => {
    if (transDragging) {
        const dx = e.clientX - transDragStart.x;
        const dy = e.clientY - transDragStart.y;
        translationBox.style.left = (transBoxStart.x + dx) + 'px';
        translationBox.style.top = (transBoxStart.y + dy) + 'px';
    }
    if (transResizing) {
        const dx = e.clientX - transDragStart.x;
        const dy = e.clientY - transDragStart.y;
        translationBox.style.width = Math.max(200, transBoxStart.width + dx) + 'px';
        translationBox.style.height = Math.max(50, transBoxStart.height + dy) + 'px';
    }
});

document.addEventListener('mouseup', () => {
    if (transDragging || transResizing) saveTranslationPos();
    transDragging = false;
    transResizing = false;
});

// 键盘状态
const keyStates = new Uint32Array(8);

// 鼠标状态
let mouseBtn = 0;
let lastMouseX = 0;
let lastMouseY = 0;
let mouse_dx = 0;
let mouse_dy = 0;

const keyMap = {
    'Escape': 0x01, '1': 0x02, '2': 0x03, '3': 0x04, '4': 0x05,
    '5': 0x06, '6': 0x07, '7': 0x08, '8': 0x09, '9': 0x0A, '0': 0x0B,
    'Minus': 0x0C, 'Equal': 0x0D, 'Backspace': 0x0E, 'Tab': 0x0F,
    'q': 0x10, 'w': 0x11, 'e': 0x12, 'r': 0x13, 't': 0x14,
    'y': 0x15, 'u': 0x16, 'i': 0x17, 'o': 0x18, 'p': 0x19,
    'BracketLeft': 0x1A, 'BracketRight': 0x1B, 'Enter': 0x1C,
    'ControlLeft': 0x1D, 'a': 0x1E, 's': 0x1F, 'd': 0x20, 'f': 0x21,
    'g': 0x22, 'h': 0x23, 'j': 0x24, 'k': 0x25, 'l': 0x26,
    'Semicolon': 0x27, 'Quote': 0x28, 'Backquote': 0x29,
    'ShiftLeft': 0x2A, 'Backslash': 0x2B, 'z': 0x2C, 'x': 0x2D,
    'c': 0x2E, 'v': 0x2F, 'b': 0x30, 'n': 0x31, 'm': 0x32,
    'Comma': 0x33, 'Period': 0x34, 'Slash': 0x35, 'ShiftRight': 0x36,
    'AltLeft': 0x38, 'Space': 0x39, 'CapsLock': 0x3A,
    'F1': 0x3B, 'F2': 0x3C, 'F3': 0x3D, 'F4': 0x3E, 'F5': 0x3F,
    'F6': 0x40, 'F7': 0x41, 'F8': 0x42, 'F9': 0x43, 'F10': 0x44,
    'ArrowUp': 0x48, 'ArrowLeft': 0x4B, 'ArrowRight': 0x4D, 'ArrowDown': 0x50,
    'Insert': 0x52, 'Delete': 0x53,
};

function setKey(scancode, pressed) {
    const index = scancode >> 5;
    const bit = scancode & 0x1F;
    if (pressed) {
        keyStates[index] |= (1 << bit);
    } else {
        keyStates[index] &= ~(1 << bit);
    }
    sendInput();
}

function sendInput() {
    // Update display
    document.getElementById('mouse-pos').textContent = `x:${lastMouseX} y:${lastMouseY}`;
    document.getElementById('mouse-delta').textContent = `dx:${mouse_dx} dy:${mouse_dy}`;

    wsSend({
        type: 'input',
        keys: Array.from(keyStates),
        mouse_x: lastMouseX,
        mouse_y: lastMouseY,
        mouse_dx: mouse_dx,
        mouse_dy: mouse_dy,
        mouseBtn: mouseBtn
    });

    mouse_dx = 0;
    mouse_dy = 0;
}

function sendRegion(region) {
    wsSend({ type: 'region', ...region });

    if (region) {
        localStorage.setItem('ocrRegion', JSON.stringify(region));
    } else {
        localStorage.removeItem('ocrRegion');
    }
}

function loadSavedRegion() {
    const saved = localStorage.getItem('ocrRegion');
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            if (parsed.x !== undefined && parsed.y !== undefined &&
                parsed.width !== undefined && parsed.height !== undefined) {
                ocrRegion = parsed;
                regionInfo.textContent = `Region: (${ocrRegion.x},${ocrRegion.y}) ${ocrRegion.width}x${ocrRegion.height}`;
                sendRegion(ocrRegion);
            } else {
                localStorage.removeItem('ocrRegion');
            }
        } catch (e) {
            localStorage.removeItem('ocrRegion');
        }
    }
}

// Region selection
selectBtn.addEventListener('click', () => {
    selectMode = true;
    modeInfo.textContent = '[SELECTING - Drag on screen]';
    selectBtn.disabled = true;
});

resetBtn.addEventListener('click', () => {
    ocrRegion = null;
    selectMode = false;
    dragStart = null;
    dragEnd = null;
    regionOverlay.style.display = 'none';
    regionInfo.textContent = 'Region: Full Screen';
    modeInfo.textContent = '';
    selectBtn.disabled = false;
    sendRegion(null);
});

// Mouse events (only when not pointer locked)
canvas.addEventListener('mousedown', (e) => {
    if (isPointerLocked) return;

    const rect = canvas.getBoundingClientRect();
    const currentX = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
    const currentY = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));

    lastMouseX = currentX;
    lastMouseY = currentY;

    if (selectMode) {
        dragStart = { x: currentX, y: currentY };
    } else {
        mouseBtn = (e.button === 0) ? 1 : (e.button === 2) ? 2 : (e.button === 1) ? 4 : 0;
        mouse_dx = 0;
        mouse_dy = 0;
        sendInput();
    }
    e.preventDefault();
});

canvas.addEventListener('contextmenu', (e) => e.preventDefault());

canvas.addEventListener('mousemove', (e) => {
    if (isPointerLocked) return;

    const rect = canvas.getBoundingClientRect();
    const currentX = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
    const currentY = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));

    mouse_dx = currentX - lastMouseX;
    mouse_dy = currentY - lastMouseY;
    lastMouseX = currentX;
    lastMouseY = currentY;

    if (selectMode && dragStart) {
        dragEnd = { x: currentX, y: currentY };
        updateRegionOverlay();
    } else if (!selectMode && (mouse_dx !== 0 || mouse_dy !== 0)) {
        sendInput();
    }
    e.preventDefault();
});

canvas.addEventListener('mouseup', (e) => {
    if (isPointerLocked) return;

    const rect = canvas.getBoundingClientRect();
    const currentX = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
    const currentY = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));

    lastMouseX = currentX;
    lastMouseY = currentY;

    if (selectMode && dragStart) {
        dragEnd = { x: currentX, y: currentY };

        const x1 = Math.min(dragStart.x, dragEnd.x);
        const y1 = Math.min(dragStart.y, dragEnd.y);
        const x2 = Math.max(dragStart.x, dragEnd.x);
        const y2 = Math.max(dragStart.y, dragEnd.y);

        if (x2 - x1 > 10 && y2 - y1 > 10) {
            ocrRegion = { x: x1, y: y1, width: x2 - x1, height: y2 - y1 };
            regionInfo.textContent = `Region: (${x1},${y1}) ${x2-x1}x${y2-y1}`;
            sendRegion(ocrRegion);
        }

        selectMode = false;
        dragStart = null;
        dragEnd = null;
        modeInfo.textContent = '';
        selectBtn.disabled = false;
    } else {
        mouseBtn = 0;
        mouse_dx = 0;
        mouse_dy = 0;
        sendInput();
    }
    e.preventDefault();
});

function updateRegionOverlay() {
    if (dragStart && dragEnd) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = rect.width / canvas.width;
        const scaleY = rect.height / canvas.height;

        const x1 = Math.min(dragStart.x, dragEnd.x);
        const y1 = Math.min(dragStart.y, dragEnd.y);
        const w = Math.abs(dragEnd.x - dragStart.x);
        const h = Math.abs(dragEnd.y - dragStart.y);

        regionOverlay.style.display = 'block';
        regionOverlay.style.left = (x1 * scaleX) + 'px';
        regionOverlay.style.top = (y1 * scaleY) + 'px';
        regionOverlay.style.width = (w * scaleX) + 'px';
        regionOverlay.style.height = (h * scaleY) + 'px';
    }
}

function showRegionOverlay() {
    if (ocrRegion) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = rect.width / canvas.width;
        const scaleY = rect.height / canvas.height;

        regionOverlay.style.display = 'block';
        regionOverlay.style.left = (ocrRegion.x * scaleX) + 'px';
        regionOverlay.style.top = (ocrRegion.y * scaleY) + 'px';
        regionOverlay.style.width = (ocrRegion.width * scaleX) + 'px';
        regionOverlay.style.height = (ocrRegion.height * scaleY) + 'px';
    } else {
        regionOverlay.style.display = 'none';
    }
}

// Keyboard input
document.addEventListener('keydown', (e) => {
    if (selectMode) return;
    e.preventDefault();
    const scancode = keyMap[e.key] || keyMap[e.key.toLowerCase()];
    if (scancode) setKey(scancode, true);
});

document.addEventListener('keyup', (e) => {
    if (selectMode) return;
    e.preventDefault();
    const scancode = keyMap[e.key] || keyMap[e.key.toLowerCase()];
    if (scancode) setKey(scancode, false);
});

// FPS counter
let frameCount = 0;
let lastTime = performance.now();

// Init
loadSavedRegion();
loadTranslationPos();
loadLangConfig();
loadOcrTypeConfig();
connectWebSocket();
    </script>
</body>
</html>
