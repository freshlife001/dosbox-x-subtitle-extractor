<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOSBox-X Remote Control</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; touch-action: none; }
        #screen-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        canvas { border: 2px solid #333; display: block; max-width: 100%; max-height: 100%; object-fit: contain; z-index: 1; }
        #info { position: absolute; top: 5px; left: 5px; color: #fff; font-family: monospace; font-size: 10px; z-index: 100; }
        #output-box { position: fixed; bottom: 10px; left: 10px; right: 10px; background: rgba(0,0,0,0.9); padding: 10px; z-index: 1000; border: 2px solid #ff0; cursor: move; user-select: none; display: flex; flex-direction: column; max-height: 25vh; min-height: 60px; }
        #ocr-line { color: #0f0; font-family: monospace; font-size: 12px; margin-bottom: 4px; white-space: pre-wrap; cursor: text; user-select: text; }
        #translation-line { color: #ff0; font-family: monospace; font-size: 14px; white-space: pre-wrap; cursor: text; user-select: text; flex: 1; overflow: auto; }
        #output-resize { position: absolute; right: 0; bottom: 0; width: 24px; height: 24px; cursor: nwse-resize; background: linear-gradient(135deg, transparent 50%, #f80 50%); }
        #controls { position: absolute; top: 25px; left: 5px; color: #fff; font-family: monospace; z-index: 100; font-size: 10px; display: flex; flex-wrap: wrap; gap: 3px; }
        #controls button { margin: 0; padding: 6px 10px; cursor: pointer; font-size: 10px; border-radius: 4px; }
        #controls select { margin: 0; padding: 4px 6px; background: #333; color: #fff; border: 1px solid #fff; cursor: pointer; font-size: 10px; border-radius: 4px; }
        #region-info { position: absolute; top: 25px; right: 5px; color: #0ff; font-family: monospace; background: rgba(0,0,0,0.8); padding: 3px 5px; font-size: 10px; z-index: 100; }
        .region-overlay { position: absolute; border: 2px solid #ff0; background: rgba(255,255,0,0.2); pointer-events: none; z-index: 50; }
        #connection-status { position: absolute; top: 5px; right: 5px; color: #fff; font-family: monospace; font-size: 10px; z-index: 100; }
        #menu-toggle { display: none; position: absolute; top: 18px; left: 2px; z-index: 150; background: #333; color: #fff; border: 1px solid #fff; padding: 6px 10px; font-size: 11px; cursor: pointer; border-radius: 4px; }

        /* 移动端适配 */
        @media (max-width: 600px), (pointer: coarse) {
            #menu-toggle { display: block; }
            #info { font-size: 9px; top: 2px; left: 2px; }
            #connection-status { font-size: 9px; top: 2px; right: 2px; }
            #controls {
                display: none;  /* 默认隐藏 */
                top: 45px; left: 2px; right: 2px;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 2px;
                background: rgba(0,0,0,0.9);
                padding: 5px;
                border-radius: 4px;
            }
            #controls.visible { display: flex; }
            #controls button, #controls select {
                flex: 1 1 auto;
                min-width: 80px;
                padding: 8px 6px;
                font-size: 11px;
            }
            #region-info { top: 18px; right: 2px; font-size: 9px; display: none; }
            #region-info.visible { display: block; }
            #ocr-line { font-size: 11px; }
            #translation-line { font-size: 12px; }
            #output-box {
                position: fixed;
                bottom: 5px;
                left: 5px;
                right: 5px;
                max-height: 30vh;
                min-height: 80px;
                padding: 8px;
                z-index: 1000;
            }
            #output-resize { width: 32px; height: 32px; }
            canvas { max-height: 55vh; }
        }

        /* 竖屏优化 */
        @media (max-width: 600px) and (orientation: portrait) {
            canvas { max-height: 50vh; }
            #output-box { max-height: 35vh; min-height: 100px; }
        }
    </style>
</head>
<body>
    <div id="screen-container">
        <div id="info">FPS: <span id="fps">0</span> | Mouse: <span id="mouse-pos">x:0 y:0</span> | Δ: <span id="mouse-delta">dx:0 dy:0</span></div>
        <div id="connection-status">WS: <span id="ws-status">Disconnected</span></div>
        <button id="menu-toggle">☰ 菜单</button>
        <div id="output-box">
            <div id="ocr-line">OCR: <span id="ocr-text">-</span></div>
            <div id="translation-line">翻译: <span id="translation-text">-</span></div>
            <div id="output-resize"></div>
        </div>
        <div id="controls">
            <button id="fullscreen">Fullscreen</button>
            <button id="select-region">Select OCR Region</button>
            <button id="reset-region">Reset Region</button>
            <select id="ocr-type-select">
                <option value="ollama">Ollama OCR</option>
                <option value="vision">Vision OCR</option>
            </select>
            <select id="lang-select">
                <option value="zh">中文</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
                <option value="es">Español</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="ru">Русский</option>
            </select>
            <span id="mode-info"></span>
        </div>
        <div id="region-info">Region: Full Screen</div>
        <canvas id="screen"></canvas>
        <div id="region-overlay" class="region-overlay" style="display:none;"></div>
    </div>

    <script>
// Menu toggle for mobile
const menuToggle = document.getElementById('menu-toggle');
const controlsDiv = document.getElementById('controls');
const regionInfoDiv = document.getElementById('region-info');

menuToggle.addEventListener('click', () => {
    controlsDiv.classList.toggle('visible');
    regionInfoDiv.classList.toggle('visible');
});

const canvas = document.getElementById('screen');
    const ctx = canvas.getContext('2d');
    let fpsSpan = document.getElementById('fps');
    let wsStatusSpan = document.getElementById('ws-status');
    let ocrText = document.getElementById('ocr-text');
    let translationText = document.getElementById('translation-text');
    const screenContainer = document.getElementById('screen-container');
    const regionOverlay = document.getElementById('region-overlay');
    let regionInfo = document.getElementById('region-info');
    const modeInfo = document.getElementById('mode-info');
    let selectBtn = document.getElementById('select-region');
    let resetBtn = document.getElementById('reset-region');
    const langSelect = document.getElementById('lang-select');
    const ocrTypeSelect = document.getElementById('ocr-type-select');
    let fullscreenBtn = document.getElementById('fullscreen');

// WebSocket connection
let ws = null;
let reconnectTimer = null;

function connectWebSocket() {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = protocol + '//' + window.location.host;

    ws = new WebSocket(wsUrl, 'ws');

    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
        const t = UI_LANGS[currentLang] || UI_LANGS['en'];
        wsStatusSpan.textContent = t.connected;
        wsStatusSpan.style.color = '#0f0';
        console.log('[WS] Connected');

        // Send initial config
        sendConfig();
    };

    ws.onclose = () => {
        const t = UI_LANGS[currentLang] || UI_LANGS['en'];
        wsStatusSpan.textContent = t.disconnected;
        wsStatusSpan.style.color = '#f00';
        console.log('[WS] Disconnected');

        // Auto reconnect
        if (!reconnectTimer) {
            reconnectTimer = setTimeout(() => {
                reconnectTimer = null;
                connectWebSocket();
            }, 3000);
        }
    };

    ws.onerror = (err) => {
        console.error('[WS] Error:', err);
    };

    ws.onmessage = (event) => {
        if (event.data instanceof ArrayBuffer) {
            // Binary frame data
            handleFrameData(event.data);
        } else {
            // Text message (JSON)
            handleTextMessage(event.data);
        }
    };
}

// Frame queue for requestAnimationFrame rendering
    let frameQueue = [];
    const MAX_QUEUE_SIZE = 2;  // Only keep latest 2 frames

function handleFrameData(data) {
    const view = new DataView(data);
    const type = view.getUint8(0);

    if (type === 0x02) {  // JPEG frame type
        const width = view.getUint16(1, true);
        const height = view.getUint16(3, true);

        if (width < 32 || height < 32 || width > 2048 || height > 2048) return;

        // Extract JPEG data (skip 5-byte header) and store
        const jpegData = new Uint8Array(data).slice(5);

        if (frameQueue.length >= MAX_QUEUE_SIZE) {
            frameQueue.shift();  // Drop oldest
        }
        frameQueue.push({type: 'jpeg', width, height, jpegData});

    } else if (type === 0x01) {  // Raw BGRA frame type (fallback)
        const width = view.getUint16(1, true);
        const height = view.getUint16(3, true);

        if (width < 32 || height < 32 || width > 2048 || height > 2048) return;

        const rawData = new Uint8Array(data).slice(5);

        if (frameQueue.length >= MAX_QUEUE_SIZE) {
            frameQueue.shift();
        }
        frameQueue.push({type: 'raw', width, height, rawData});
    }
}

// requestAnimationFrame rendering loop
function renderLoop() {
    if (frameQueue.length > 0) {
        const frame = frameQueue.shift();

        if (frame.type === 'jpeg') {
            const blob = new Blob([frame.jpegData], {type: 'image/jpeg'});
            createImageBitmap(blob).then(imageBitmap => {
                if (canvas.width !== frame.width || canvas.height !== frame.height) {
                    canvas.width = frame.width;
                    canvas.height = frame.height;
                }
                ctx.drawImage(imageBitmap, 0, 0);
                imageBitmap.close();
                showRegionOverlay();
            }).catch(err => console.error('[JPEG] Decode error:', err));
        } else if (frame.type === 'raw') {
            if (canvas.width !== frame.width || canvas.height !== frame.height) {
                canvas.width = frame.width;
                canvas.height = frame.height;
            }
            const frameData = frame.rawData;
            const imageData = ctx.createImageData(frame.width, frame.height);
            for (let i = 0; i < frame.width * frame.height * 4; i += 4) {
                imageData.data[i + 0] = frameData[i + 2];
                imageData.data[i + 1] = frameData[i + 1];
                imageData.data[i + 2] = frameData[i + 0];
                imageData.data[i + 3] = 255;
            }
            ctx.putImageData(imageData, 0, 0);
            showRegionOverlay();
        }

        frameCount++;
        const now = performance.now();
        if (now - lastTime >= 1000) {
            fpsSpan.textContent = frameCount;
            frameCount = 0;
            lastTime = now;
        }
    }
    requestAnimationFrame(renderLoop);
}
requestAnimationFrame(renderLoop);

function handleTextMessage(message) {
    try {
        const data = JSON.parse(message);

        if (data.type === 'ocr' && data.text) {
            if (data.text !== lastOcrText) {
                lastOcrText = data.text;
                ocrText.textContent = data.text;
            }
        } else if (data.type === 'translation' && data.text) {
            translationText.textContent = data.text;
        }
    } catch (e) {
        console.error('[WS] Parse error:', e);
    }
}

function sendConfig() {
    // Send saved region
    if (ocrRegion) {
        wsSend({ type: 'region', ...ocrRegion });
    }

    // Send OCR type
    wsSend({ type: 'ocr-type', ocr_type: currentOcrType });
}

function wsSend(message) {
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(message));
    }
}

// OCR type configuration
const OCR_TYPES = { ollama: 'Ollama OCR', vision: 'Vision OCR' };
let currentOcrType = 'ollama';

ocrTypeSelect.addEventListener('change', () => {
    currentOcrType = ocrTypeSelect.value;
    localStorage.setItem('ocrType', currentOcrType);
    wsSend({ type: 'ocr-type', ocr_type: currentOcrType });
});

function loadOcrTypeConfig() {
    const saved = localStorage.getItem('ocrType');
    if (saved && OCR_TYPES[saved]) {
        currentOcrType = saved;
        ocrTypeSelect.value = saved;
    }
}

// Language configuration

    es: 'Español', fr: 'Français', de: 'Deutsch', ru: 'Русский'
};
let currentLang = 'zh';

    // UI language translations
    const UI_LANGS = {

        },

            region: '領域',
            fullScreen: '全画面',
            connected: '接続済み',

        },
        ko: {
            fps: 'FPS',
            mouse: '마우스',
            delta: 'Δ',
            ws: 'WS',
            ocr: 'OCR',
            translation: '번역',
            fullscreen: '전체화면',
            selectRegion: 'OCR 영역 선택',

            region: '영역',
            fullScreen: '전체 화면',
            connected: '연결됨',

        },
        es: {
            fps: 'FPS',
            mouse: 'Ratón',
            delta: 'Δ',
            ws: 'WS',
            ocr: 'OCR',
            translation: 'Traducción',
            fullscreen: 'Pantalla completa',

        },
        fr: {

            mouse: 'Souris',
            delta: 'Δ',
            ws: 'WS',
            ocr: 'OCR',
            translation: 'Traduction',
            fullscreen: 'Plein écran',
            selectRegion: 'Sélectionner région OCR',
            resetRegion: 'Réinitialiser région',
            region: 'Région',
            fullScreen: 'Plein écran',
            connected: 'Connecté',

        },
        de: {
            fps: 'FPS',
            mouse: 'Maus',
            delta: 'Δ',

            ocr: 'OCR',
            translation: 'Übersetzung',
            fullscreen: 'Vollbild',
            selectRegion: 'OCR-Bereich wählen',

        },
        ru: {

            translation: 'Перевод',
            fullscreen: 'Полный экран',
            selectRegion: 'Выбрать область OCR',
            resetRegion: 'Сбросить область',
            region: 'Область',
            fullScreen: 'Полный экран',
            connected: 'Подключено',
            disconnected: 'Отключено'
        }
    };

    function updateUILanguage(lang) {
        const t = UI_LANGS[lang] || UI_LANGS['en'];
        document.getElementById('info').innerHTML = `${t.fps}: <span id="fps">0</span> | ${t.mouse}: <span id="mouse-pos">x:0 y:0</span> | ${t.delta}: <span id="mouse-delta">dx:0 dy:0</span>`;
        document.getElementById('connection-status').innerHTML = `${t.ws}: <span id="ws-status">${t.disconnected}</span>`;
        document.getElementById('ocr-line').innerHTML = `${t.ocr}: <span id="ocr-text">-</span>`;
        document.getElementById('translation-line').innerHTML = `${t.translation}: <span id="translation-text">-</span>`;
        fullscreenBtn.textContent = t.fullscreen;
        selectBtn.textContent = t.selectRegion;
        resetBtn.textContent = t.resetRegion;
        regionInfo.textContent = `${t.region}: ${t.fullScreen}`;

        // Update refs after DOM change
        fpsSpan = document.getElementById('fps');
        wsStatusSpan = document.getElementById('ws-status');
        ocrText = document.getElementById('ocr-text');
        translationText = document.getElementById('translation-text');
        wsStatusSpan.textContent = ws && ws.readyState === WebSocket.OPEN ? t.connected : t.disconnected;
    }

    langSelect.addEventListener('change', () => {
        currentLang = langSelect.value;
        localStorage.setItem('translationLang', currentLang);
        updateUILanguage(currentLang);
        // 发送语言设置到后端
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({type: 'translation-lang', lang: currentLang}));
        }
    });

function loadLangConfig() {
    const saved = localStorage.getItem('translationLang');
    if (saved && LANG_NAMES[saved]) {
        currentLang = saved;
        langSelect.value = saved;
    }
}

// Fullscreen + Pointer Lock
let isPointerLocked = false;

fullscreenBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) {
        screenContainer.requestFullscreen().then(() => {
            canvas.requestPointerLock();
        }).catch(err => console.error('Fullscreen error:', err));
    } else {
        document.exitFullscreen();
        if (document.pointerLockElement) {
            document.exitPointerLock();
        }
    }
});

document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement && document.pointerLockElement) {
        document.exitPointerLock();
    }
});

document.addEventListener('pointerlockchange', () => {
    isPointerLocked = document.pointerLockElement === canvas;
    if (isPointerLocked) {
        modeInfo.textContent = '[Pointer Locked - ESC to exit]';
        fullscreenBtn.textContent = 'Exit Fullscreen';
    } else {
        modeInfo.textContent = '';
        fullscreenBtn.textContent = 'Fullscreen';
    }
});

// Pointer lock mouse movement
document.addEventListener('mousemove', (e) => {
    if (isPointerLocked) {
        mouse_dx = e.movementX;
        mouse_dy = e.movementY;
        sendInput();
    }
});

// Pointer lock mouse buttons
document.addEventListener('mousedown', (e) => {
    if (isPointerLocked && e.target === canvas) {
        mouseBtn = (e.button === 0) ? 1 : (e.button === 2) ? 2 : (e.button === 1) ? 4 : 0;
        sendInput();
        e.preventDefault();
    }
});

document.addEventListener('mouseup', (e) => {
    if (isPointerLocked && e.target === canvas) {
        mouseBtn = 0;
        sendInput();
        e.preventDefault();
    }
});

// OCR history (for display only, translation done on backend)
const ocrHistory = [];
const MAX_OCR_HISTORY = 3;
let lastOcrText = '';

// OCR Region
let ocrRegion = null;
let selectMode = false;
let dragStart = null;
let dragEnd = null;

// Output Box drag & resize
const outputBox = document.getElementById('output-box');
const outputResize = document.getElementById('output-resize');
let transDragging = false;
let transResizing = false;
let transDragStart = { x: 0, y: 0 };
let transBoxStart = { x: 0, y: 0, width: 0, height: 0 };

function saveTranslationPos() {
    localStorage.setItem('outputPos', JSON.stringify({
        left: outputBox.style.left,
        top: outputBox.style.top,
        bottom: outputBox.style.bottom,
        width: outputBox.style.width,
        height: outputBox.style.height
    }));
}

function loadTranslationPos() {
    const saved = localStorage.getItem('outputPos');
    if (saved) {
        try {
            const pos = JSON.parse(saved);
            if (pos.left) outputBox.style.left = pos.left;
            if (pos.top) outputBox.style.top = pos.top;
            if (pos.bottom) outputBox.style.bottom = pos.bottom || '';
            if (pos.width) outputBox.style.width = pos.width;
            if (pos.height) outputBox.style.height = pos.height || '';
        } catch (e) {
            localStorage.removeItem('outputPos');
        }
    }
}

outputBox.addEventListener('mousedown', (e) => {
    if (e.target === outputResize) return;
    transDragging = true;
    transDragStart = { x: e.clientX, y: e.clientY };
    const containerRect = screenContainer.getBoundingClientRect();
    const boxRect = outputBox.getBoundingClientRect();
    transBoxStart = { x: boxRect.left - containerRect.left, y: boxRect.top - containerRect.top };
    outputBox.style.bottom = '';
    e.preventDefault();
});

outputResize.addEventListener('mousedown', (e) => {
    transResizing = true;
    transDragStart = { x: e.clientX, y: e.clientY };
    const rect = outputBox.getBoundingClientRect();
    transBoxStart = { width: rect.width, height: rect.height };
    e.preventDefault();
    e.stopPropagation();
});

document.addEventListener('mousemove', (e) => {
    if (transDragging) {
        const dx = e.clientX - transDragStart.x;
        const dy = e.clientY - transDragStart.y;
        outputBox.style.left = (transBoxStart.x + dx) + 'px';
        outputBox.style.top = (transBoxStart.y + dy) + 'px';
    }
    if (transResizing) {
        const dx = e.clientX - transDragStart.x;
        const dy = e.clientY - transDragStart.y;
        outputBox.style.width = Math.max(200, transBoxStart.width + dx) + 'px';
        outputBox.style.height = Math.max(50, transBoxStart.height + dy) + 'px';
    }
});

document.addEventListener('mouseup', () => {
    if (transDragging || transResizing) saveTranslationPos();
    transDragging = false;
    transResizing = false;
});

// Touch events for outputBox drag/resize
outputBox.addEventListener('touchstart', (e) => {
    if (e.target === outputResize) return;
    if (e.touches.length === 0) return;
    const touch = e.touches[0];

    transDragging = true;
    transDragStart = { x: touch.clientX, y: touch.clientY };
    const containerRect = screenContainer.getBoundingClientRect();
    const boxRect = outputBox.getBoundingClientRect();
    transBoxStart = { x: boxRect.left - containerRect.left, y: boxRect.top - containerRect.top };
    outputBox.style.bottom = '';
    e.preventDefault();
}, { passive: false });

outputResize.addEventListener('touchstart', (e) => {
    if (e.touches.length === 0) return;
    const touch = e.touches[0];

    transResizing = true;
    transDragStart = { x: touch.clientX, y: touch.clientY };
    const rect = outputBox.getBoundingClientRect();
    transBoxStart = { width: rect.width, height: rect.height };
    e.preventDefault();
    e.stopPropagation();
}, { passive: false });

document.addEventListener('touchmove', (e) => {
    if (e.touches.length === 0) return;
    const touch = e.touches[0];

    if (transDragging) {
        const dx = touch.clientX - transDragStart.x;
        const dy = touch.clientY - transDragStart.y;
        outputBox.style.left = (transBoxStart.x + dx) + 'px';
        outputBox.style.top = (transBoxStart.y + dy) + 'px';
    }
    if (transResizing) {
        const dx = touch.clientX - transDragStart.x;
        const dy = touch.clientY - transDragStart.y;
        outputBox.style.width = Math.max(200, transBoxStart.width + dx) + 'px';
        outputBox.style.height = Math.max(50, transBoxStart.height + dy) + 'px';
    }
}, { passive: false });

document.addEventListener('touchend', () => {
    if (transDragging || transResizing) saveTranslationPos();
    transDragging = false;
    transResizing = false;
});

// 键盘状态
const keyStates = new Uint32Array(8);

// 鼠标状态
let mouseBtn = 0;
let lastMouseX = 0;
let lastMouseY = 0;
let mouse_dx = 0;
let mouse_dy = 0;

const keyMap = {
    'Escape': 0x01, '1': 0x02, '2': 0x03, '3': 0x04, '4': 0x05,
    '5': 0x06, '6': 0x07, '7': 0x08, '8': 0x09, '9': 0x0A, '0': 0x0B,
    'Minus': 0x0C, 'Equal': 0x0D, 'Backspace': 0x0E, 'Tab': 0x0F,
    'q': 0x10, 'w': 0x11, 'e': 0x12, 'r': 0x13, 't': 0x14,
    'y': 0x15, 'u': 0x16, 'i': 0x17, 'o': 0x18, 'p': 0x19,
    'BracketLeft': 0x1A, 'BracketRight': 0x1B, 'Enter': 0x1C,
    'ControlLeft': 0x1D, 'a': 0x1E, 's': 0x1F, 'd': 0x20, 'f': 0x21,
    'g': 0x22, 'h': 0x23, 'j': 0x24, 'k': 0x25, 'l': 0x26,
    'Semicolon': 0x27, 'Quote': 0x28, 'Backquote': 0x29,
    'ShiftLeft': 0x2A, 'Backslash': 0x2B, 'z': 0x2C, 'x': 0x2D,
    'c': 0x2E, 'v': 0x2F, 'b': 0x30, 'n': 0x31, 'm': 0x32,
    'Comma': 0x33, 'Period': 0x34, 'Slash': 0x35, 'ShiftRight': 0x36,
    'AltLeft': 0x38, 'Space': 0x39, 'CapsLock': 0x3A,
    'F1': 0x3B, 'F2': 0x3C, 'F3': 0x3D, 'F4': 0x3E, 'F5': 0x3F,
    'F6': 0x40, 'F7': 0x41, 'F8': 0x42, 'F9': 0x43, 'F10': 0x44,
    'ArrowUp': 0x48, 'ArrowLeft': 0x4B, 'ArrowRight': 0x4D, 'ArrowDown': 0x50,
    'Insert': 0x52, 'Delete': 0x53,
};

function setKey(scancode, pressed) {
    const index = scancode >> 5;
    const bit = scancode & 0x1F;
    if (pressed) {
        keyStates[index] |= (1 << bit);
    } else {
        keyStates[index] &= ~(1 << bit);
    }
    sendInput();
}

function sendInput() {
    // Update display
    document.getElementById('mouse-pos').textContent = `x:${lastMouseX} y:${lastMouseY}`;
    document.getElementById('mouse-delta').textContent = `dx:${mouse_dx} dy:${mouse_dy}`;

    wsSend({
        type: 'input',
        keys: Array.from(keyStates),
        mouse_x: lastMouseX,
        mouse_y: lastMouseY,
        mouse_dx: mouse_dx,
        mouse_dy: mouse_dy,
        mouseBtn: mouseBtn
    });

    mouse_dx = 0;
    mouse_dy = 0;
}

function sendRegion(region) {
    wsSend({ type: 'region', ...region });

    if (region) {
        localStorage.setItem('ocrRegion', JSON.stringify(region));
    } else {
        localStorage.removeItem('ocrRegion');
    }
}

function loadSavedRegion() {
    const t = UI_LANGS[currentLang] || UI_LANGS['en'];
    const saved = localStorage.getItem('ocrRegion');
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            if (parsed.x !== undefined && parsed.y !== undefined &&
                parsed.width !== undefined && parsed.height !== undefined) {
                ocrRegion = parsed;
                regionInfo.textContent = `${t.region}: (${ocrRegion.x},${ocrRegion.y}) ${ocrRegion.width}x${ocrRegion.height}`;
                sendRegion(ocrRegion);
            } else {
                localStorage.removeItem('ocrRegion');
            }
        } catch (e) {
            localStorage.removeItem('ocrRegion');
        }
    }
}

// Region selection
selectBtn.addEventListener('click', () => {
    selectMode = true;
    modeInfo.textContent = '[SELECTING - Drag on screen]';
    selectBtn.disabled = true;
});

resetBtn.addEventListener('click', () => {
    ocrRegion = null;
    selectMode = false;
    dragStart = null;
    dragEnd = null;
    regionOverlay.style.display = 'none';
    regionInfo.textContent = `${t.region}: ${t.fullScreen}`;
    modeInfo.textContent = '';
    selectBtn.disabled = false;
    sendRegion(null);
});

// Mouse events (only when not pointer locked)
canvas.addEventListener('mousedown', (e) => {
    if (isPointerLocked) return;

    const rect = canvas.getBoundingClientRect();
    const currentX = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
    const currentY = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));

    lastMouseX = currentX;
    lastMouseY = currentY;

    if (selectMode) {
        dragStart = { x: currentX, y: currentY };
    } else {
        mouseBtn = (e.button === 0) ? 1 : (e.button === 2) ? 2 : (e.button === 1) ? 4 : 0;
        mouse_dx = 0;
        mouse_dy = 0;
        sendInput();
    }
    e.preventDefault();
});

canvas.addEventListener('contextmenu', (e) => e.preventDefault());

canvas.addEventListener('mousemove', (e) => {
    if (isPointerLocked) return;

    const rect = canvas.getBoundingClientRect();
    const currentX = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
    const currentY = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));

    mouse_dx = currentX - lastMouseX;
    mouse_dy = currentY - lastMouseY;
    lastMouseX = currentX;
    lastMouseY = currentY;

    if (selectMode && dragStart) {
        dragEnd = { x: currentX, y: currentY };
        updateRegionOverlay();
    } else if (!selectMode && (mouse_dx !== 0 || mouse_dy !== 0)) {
        sendInput();
    }
    e.preventDefault();
});

canvas.addEventListener('mouseup', (e) => {
    if (isPointerLocked) return;

    const rect = canvas.getBoundingClientRect();
    const currentX = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
    const currentY = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));

    lastMouseX = currentX;
    lastMouseY = currentY;

    if (selectMode && dragStart) {
        dragEnd = { x: currentX, y: currentY };

        const x1 = Math.min(dragStart.x, dragEnd.x);
        const y1 = Math.min(dragStart.y, dragEnd.y);
        const x2 = Math.max(dragStart.x, dragEnd.x);
        const y2 = Math.max(dragStart.y, dragEnd.y);

        if (x2 - x1 > 10 && y2 - y1 > 10) {
            const t = UI_LANGS[currentLang] || UI_LANGS['en'];
            ocrRegion = { x: x1, y: y1, width: x2 - x1, height: y2 - y1 };
            regionInfo.textContent = `${t.region}: (${x1},${y1}) ${x2-x1}x${y2-y1}`;
            sendRegion(ocrRegion);
        }

        selectMode = false;
        dragStart = null;
        dragEnd = null;
        modeInfo.textContent = '';
        selectBtn.disabled = false;
    } else {
        mouseBtn = 0;
        mouse_dx = 0;
        mouse_dy = 0;
        sendInput();
    }
    e.preventDefault();
});

// Touch events for mobile
canvas.addEventListener('touchstart', (e) => {
    if (isPointerLocked || e.touches.length === 0) return;
    const touch = e.touches[0];

    const rect = canvas.getBoundingClientRect();
    const currentX = Math.floor((touch.clientX - rect.left) * (canvas.width / rect.width));
    const currentY = Math.floor((touch.clientY - rect.top) * (canvas.height / rect.height));

    lastMouseX = currentX;
    lastMouseY = currentY;

    if (selectMode) {
        dragStart = { x: currentX, y: currentY };
    } else {
        mouseBtn = 1;  // Touch = left click
        mouse_dx = 0;
        mouse_dy = 0;
        sendInput();
    }
    e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    if (isPointerLocked || e.touches.length === 0) return;
    const touch = e.touches[0];

    const rect = canvas.getBoundingClientRect();
    const currentX = Math.floor((touch.clientX - rect.left) * (canvas.width / rect.width));
    const currentY = Math.floor((touch.clientY - rect.top) * (canvas.height / rect.height));

    mouse_dx = currentX - lastMouseX;
    mouse_dy = currentY - lastMouseY;
    lastMouseX = currentX;
    lastMouseY = currentY;

    if (selectMode && dragStart) {
        dragEnd = { x: currentX, y: currentY };
        updateRegionOverlay();
    } else if (!selectMode && (mouse_dx !== 0 || mouse_dy !== 0)) {
        sendInput();
    }
    e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    if (isPointerLocked) return;

    if (selectMode && dragStart && dragEnd) {
        const x1 = Math.min(dragStart.x, dragEnd.x);
        const y1 = Math.min(dragStart.y, dragEnd.y);
        const x2 = Math.max(dragStart.x, dragEnd.x);
        const y2 = Math.max(dragStart.y, dragEnd.y);

        if (x2 - x1 > 10 && y2 - y1 > 10) {
            const t = UI_LANGS[currentLang] || UI_LANGS['en'];
            ocrRegion = { x: x1, y: y1, width: x2 - x1, height: y2 - y1 };
            regionInfo.textContent = `${t.region}: (${x1},${y1}) ${x2-x1}x${y2-y1}`;
            sendRegion(ocrRegion);
        }

        selectMode = false;
        dragStart = null;
        dragEnd = null;
        modeInfo.textContent = '';
        selectBtn.disabled = false;
    } else {
        mouseBtn = 0;
        mouse_dx = 0;
        mouse_dy = 0;
        sendInput();
    }
    e.preventDefault();
}, { passive: false });

function updateRegionOverlay() {
    if (dragStart && dragEnd) {
        const scaleX = canvas.clientWidth / canvas.width;
        const scaleY = canvas.clientHeight / canvas.height;

        // canvas 在 screen-container 内居中，需要计算偏移
        const canvasOffsetX = (screenContainer.clientWidth - canvas.clientWidth) / 2;
        const canvasOffsetY = (screenContainer.clientHeight - canvas.clientHeight) / 2;

        const x1 = Math.min(dragStart.x, dragEnd.x);
        const y1 = Math.min(dragStart.y, dragEnd.y);
        const w = Math.abs(dragEnd.x - dragStart.x);
        const h = Math.abs(dragEnd.y - dragStart.y);

        regionOverlay.style.display = 'block';
        regionOverlay.style.left = (canvasOffsetX + x1 * scaleX) + 'px';
        regionOverlay.style.top = (canvasOffsetY + y1 * scaleY) + 'px';
        regionOverlay.style.width = (w * scaleX) + 'px';
        regionOverlay.style.height = (h * scaleY) + 'px';
    }
}

function showRegionOverlay() {
    if (ocrRegion) {
        const scaleX = canvas.clientWidth / canvas.width;
        const scaleY = canvas.clientHeight / canvas.height;

        const canvasOffsetX = (screenContainer.clientWidth - canvas.clientWidth) / 2;
        const canvasOffsetY = (screenContainer.clientHeight - canvas.clientHeight) / 2;

        regionOverlay.style.display = 'block';
        regionOverlay.style.left = (canvasOffsetX + ocrRegion.x * scaleX) + 'px';
        regionOverlay.style.top = (canvasOffsetY + ocrRegion.y * scaleY) + 'px';
        regionOverlay.style.width = (ocrRegion.width * scaleX) + 'px';
        regionOverlay.style.height = (ocrRegion.height * scaleY) + 'px';
    } else {
        regionOverlay.style.display = 'none';
    }
}

// Keyboard input
document.addEventListener('keydown', (e) => {
    if (selectMode) return;
    e.preventDefault();
    const scancode = keyMap[e.key] || keyMap[e.key.toLowerCase()];
    if (scancode) setKey(scancode, true);
});

document.addEventListener('keyup', (e) => {
    if (selectMode) return;
    e.preventDefault();
    const scancode = keyMap[e.key] || keyMap[e.key.toLowerCase()];
    if (scancode) setKey(scancode, false);
});

// FPS counter
let frameCount = 0;
let lastTime = performance.now();

// Init
loadLangConfig();
updateUILanguage(currentLang);
loadSavedRegion();
loadTranslationPos();
loadOcrTypeConfig();
connectWebSocket();
    </script>
</body>
